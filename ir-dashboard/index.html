<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Beauty AI OS - IR Pitching Dashboard</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            background: '#050505',
            magenta: '#FF00FF',
            cyber: '#00F0FF',
            card: '#111111',
            muted: '#2A2A2A',
          },
          animation: {
            'glow-pulse': 'glow 3s ease-in-out infinite alternate',
          },
          keyframes: {
            glow: {
              '0%': { boxShadow: '0 0 5px #00F0FF, 0 0 10px #00F0FF' },
              '100%': { boxShadow: '0 0 20px #00F0FF, 0 0 40px #FF00FF' }
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #050505;
      color: #ffffff;
      margin: 0;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #050505;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #FF00FF;
    }
    
    .glass-card {
      background: rgba(17, 17, 17, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
    }

    .neon-text-magenta {
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.5), 0 0 20px rgba(255, 0, 255, 0.3);
    }
    .neon-text-cyber {
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5), 0 0 20px rgba(0, 240, 255, 0.3);
    }
  </style>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel Standalone (for JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <!-- Recharts -->
  <script crossorigin src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased min-h-screen text-white relative">
  
  <!-- Background Ambient Glows -->
  <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] bg-magenta/10 blur-[150px] rounded-full pointer-events-none z-0"></div>
  <div class="fixed bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-cyber/10 blur-[150px] rounded-full pointer-events-none z-0"></div>

  <div id="root" class="relative z-10"></div>

  <!-- Load App Code -->
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
